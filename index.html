<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple HTML Piano</title>
<style>
  .piano { display: flex; }
  .key {
    width: 40px; height: 200px; margin:1px;
    background:#fff; border:1px solid #000;
    position:relative; cursor:pointer;
  }
  .key.black {
    width:30px; height:120px;
    background:#000; top:-80px; margin-left:-15px;
    z-index:2;
  }
</style>
</head>
<body>
<div class="piano">
  <div class="key" data-note="C"></div>
  <div class="key black" data-note="C#"></div>
  <div class="key" data-note="D"></div>
  <div class="key black" data-note="D#"></div>
  <div class="key" data-note="E"></div>
  <div class="key" data-note="F"></div>
  <div class="key black" data-note="F#"></div>
  <div class="key" data-note="G"></div>
  <div class="key black" data-note="G#"></div>
  <div class="key" data-note="A"></div>
  <div class="key black" data-note="A#"></div>
  <div class="key" data-note="B"></div>
</div>

<script>
const notes = {
  "C": "https://freesound.org/data/previews/269/269270_5121235-lq.mp3",
  "C#": "https://freesound.org/data/previews/269/269271_5121235-lq.mp3",
  "D": "https://freesound.org/data/previews/269/269272_5121235-lq.mp3",
  "D#": "https://freesound.org/data/previews/269/269273_5121235-lq.mp3",
  "E": "https://freesound.org/data/previews/269/269274_5121235-lq.mp3",
  "F": "https://freesound.org/data/previews/269/269275_5121235-lq.mp3",
  "F#": "https://freesound.org/data/previews/269/269276_5121235-lq.mp3",
  "G": "https://freesound.org/data/previews/269/269277_5121235-lq.mp3",
  "G#": "https://freesound.org/data/previews/269/269278_5121235-lq.mp3",
  "A": "https://freesound.org/data/previews/269/269279_5121235-lq.mp3",
  "A#": "https://freesound.org/data/previews/269/269280_5121235-lq.mp3",
  "B": "https://freesound.org/data/previews/269/269281_5121235-lq.mp3"
};

document.querySelectorAll('.key').forEach(k => {
  k.addEventListener('click', () => {
    const note = k.dataset.note;
 const audio = new Audio(notes[note]);
    audio.play();
  });
});
</script>
</body>
</html>
